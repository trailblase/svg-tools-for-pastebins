<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Widget — Rentried</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/styles.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('rentried-theme') || 'dark');</script>
</head>
<body data-page="spotify-widget">
  <site-header active-page="spotify-widget"></site-header>

  <div class="page">
    <div class="mb-3">
      <p class="page-title">Spotify Widget Generator</p>
      <p class="page-desc">Fake offline Spotify-style music card for Rentry pages.</p>
    </div>

    <div class="tool-layout">
      <div class="d-flex flex-column gap-2" style="min-width:0; overflow: hidden;">

        <div>
          <div class="panel-header">Track Info</div>
          <div class="d-flex flex-column gap-2">
            <div class="d-flex align-items-center gap-2">
              <label class="ctrl-label" style="min-width:50px">Song:</label>
              <input type="text" class="text-input" id="songName" placeholder="Song name" value="dying on the inside" style="min-height:unset;resize:none;padding:0.375rem 0.5rem;flex:1;min-width:0">
            </div>
            <div class="d-flex align-items-center gap-2">
              <label class="ctrl-label" style="min-width:50px">Artist:</label>
              <input type="text" class="text-input" id="artistName" placeholder="Artist name" value="Nessa Barrett" style="min-height:unset;resize:none;padding:0.375rem 0.5rem;flex:1;min-width:0">
            </div>
            <div class="d-flex align-items-center gap-2">
              <label class="ctrl-label" style="min-width:50px">Link:</label>
              <input type="text" class="text-input" id="linkUrl" placeholder="https://... (optional)" style="min-height:unset;resize:none;padding:0.375rem 0.5rem;flex:1;min-width:0">
            </div>
            <div class="d-flex align-items-center gap-2">
              <label class="ctrl-label" style="min-width:50px">Cover:</label>
              <input type="file" id="albumUpload" accept="image/*" style="flex:1;font-size:13px;min-width:0">
              <button class="btn-sm" id="clearAlbum" style="display:none">✕</button>
            </div>
          </div>
        </div>
        <canvas id="resizeCanvas" width="88" height="88" style="display:none"></canvas>

        <div class="controls-grid">

          <div>
            <div class="panel-header">Card Colors</div>
            <div class="d-flex align-items-center gap-2 mb-2">
              <label class="ctrl-label">Background:</label>
              <input type="color" class="color-picker" id="cardBg" value="#12122a">
              <input type="text" class="hex-input" id="cardBgHex" value="#12122a">
            </div>
            <div class="d-flex align-items-center gap-2 mb-2">
              <label class="ctrl-label">Song:</label>
              <input type="color" class="color-picker" id="songColor" value="#ffffff">
              <input type="text" class="hex-input" id="songColorHex" value="#ffffff">
            </div>
            <div class="d-flex align-items-center gap-2 mb-2">
              <label class="ctrl-label">Artist:</label>
              <input type="color" class="color-picker" id="artistColor" value="#aaaaaa">
              <input type="text" class="hex-input" id="artistColorHex" value="#aaaaaa">
            </div>
            <div class="d-flex align-items-center gap-2">
              <label class="ctrl-label">Logo:</label>
              <input type="color" class="color-picker" id="logoColor" value="#1ed760">
              <input type="text" class="hex-input" id="logoColorHex" value="#1ed760">
            </div>
          </div>

          <div>
            <div class="panel-header">Equalizer Bars</div>
            <div class="d-flex align-items-center gap-2 mb-2">
              <label class="ctrl-label">Count:</label>
              <input type="number" class="number-input" id="barCount" value="8" min="3" max="16">
            </div>
            <div class="mb-2">
              <div class="toggle-group">
                <button class="toggle-btn active" data-barcm="solid">Solid</button>
                <button class="toggle-btn" data-barcm="gradient">Gradient</button>
              </div>
            </div>
            <div id="barSolidSection">
              <div class="d-flex align-items-center gap-2">
                <label class="ctrl-label">Color:</label>
                <input type="color" class="color-picker" id="barColor" value="#1db954">
                <input type="text" class="hex-input" id="barColorHex" value="#1db954">
              </div>
            </div>
            <div id="barGradSection" style="display:none">
              <div class="d-flex align-items-center gap-2 mb-1">
                <label class="ctrl-label">Start:</label>
                <input type="color" class="color-picker" id="barGradStart" value="#ff6b6b">
                <input type="text" class="hex-input" id="barGradStartHex" value="#ff6b6b">
              </div>
              <div class="d-flex align-items-center gap-2">
                <label class="ctrl-label">End:</label>
                <input type="color" class="color-picker" id="barGradEnd" value="#1db954">
                <input type="text" class="hex-input" id="barGradEndHex" value="#1db954">
              </div>
            </div>
          </div>

          <div>
            <div class="panel-header">Card Layout</div>
            <div class="toggle-group">
              <button class="toggle-btn active" data-layout="wide">Wide</button>
              <button class="toggle-btn" data-layout="square">Square</button>
            </div>
          </div>

          <div>
            <div class="panel-header">Bar Style</div>
            <span class="section-label d-block mb-1">Shape</span>
            <div class="toggle-group mb-3">
              <button class="toggle-btn active" data-shape="sharp">Sharp</button>
              <button class="toggle-btn" data-shape="rounded">Rounded</button>
            </div>
            <span class="section-label d-block mb-1">State</span>
            <div class="toggle-group">
              <button class="toggle-btn active" data-pstate="playing">Playing</button>
              <button class="toggle-btn" data-pstate="paused">Paused</button>
            </div>
          </div>

          <div>
            <div class="panel-header">Progress Bar</div>
            <div class="d-flex align-items-center gap-2 checkbox-group mb-2">
              <input type="checkbox" id="showProgress">
              <label for="showProgress">Show progress bar</label>
            </div>
            <div id="progressSettings" style="display:none">
              <div class="mt-2">
                <div class="slider-label d-flex justify-content-between mb-1">
                  <span>Progress</span>
                  <span id="progressValue">40%</span>
                </div>
                <input type="range" class="slider" id="progressPct" min="0" max="100" value="40">
              </div>
              <div class="d-flex align-items-center gap-2 mt-2">
                <label class="ctrl-label">Color:</label>
                <input type="color" class="color-picker" id="progressColor" value="#1db954">
                <input type="text" class="hex-input" id="progressColorHex" value="#1db954">
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="tool-output">
        <div>
          <div class="panel-header">Preview</div>
          <div class="preview-area preview-widget" style="min-height:160px; padding:1rem; overflow:hidden">
            <div id="previewContent" style="display:flex;justify-content:center;max-width:100%;overflow:hidden"></div>
          </div>

          <div class="panel-header mt-2">Generated Code</div>
          <div class="code-output" id="codeOutput"></div>

          <button class="copy-btn" id="copyBtn">Copy Code</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="spotify-widget.js"></script>
  <site-footer></site-footer>
</body>
</html>
